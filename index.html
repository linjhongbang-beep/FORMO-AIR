    function switchPage(pageName) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        
        const targetPage = document.getElementById('page-' + pageName);
        const targetBtn = document.getElementById('btn-' + pageName);
        
        if (targetPage) targetPage.classList.add('active');
        if (targetBtn) targetBtn.classList.add('active');

        if(pageName === 'routes') filterHub('tpe');
        if(pageName === 'booking') { updateDestinations(); renderFarePlans(); }
        window.scrollTo(0,0);
    }

    function filterHub(hubKey, btn) {
        if(btn) {
            document.querySelectorAll('.hub-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        const hub = routesData[hubKey];
        if(!hub) return;
        let html = `<h3 style="color:#d4af37; margin-bottom:8px;">${hub.title}</h3>`;
        hub.routes.forEach(r => {
            html += `<div class="route-region-title">${r.region}</div>`;
            r.items.forEach(item => {
                html += `<div class="route-item"><span class="route-dest">${item.d}</span><span class="route-plane">${item.p}</span></div>`;
            });
        });
        document.getElementById('hub-content').innerHTML = html;
    }

    function updateDestinations() {
        const originEl = document.getElementById('book-origin');
        if (!originEl) return;
        const origin = originEl.value.toLowerCase();
        const select = document.getElementById('book-dest');
        if (!select) return;
        select.innerHTML = '';
        const hub = routesData[origin];
        if (!hub) return;
        hub.routes.forEach(r => {
            r.items.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item.d;
                opt.textContent = `${item.d} (${item.p})`;
                select.appendChild(opt);
            });
        });
    }

    function changePax(type, delta) {
        if (type === 'adult' && paxCount.adult + delta < 1) return;
        if (paxCount[type] + delta < 0) return;
        paxCount[type] += delta;
        const el = document.getElementById(`num-${type}`);
        if (el) el.innerText = paxCount[type];
    }

    function renderFarePlans() {
        const cabinEl = document.getElementById('book-cabin');
        if (!cabinEl) return;
        const cabin = cabinEl.value;
        const plans = fareData[cabin];
        const container = document.getElementById('fare-plans-container');
        if (!container || !plans) return;
        container.innerHTML = "";
        selectedPlan = plans[0].name;

        plans.forEach((plan, index) => {
            const checked = index === 0 ? "checked" : "";
            let detailHtml = plan.details.map(d => `<li>${d}</li>`).join("");
            container.innerHTML += `
                <div class="plan-card">
                    <div class="plan-header">
                        <label style="display:flex; align-items:center; gap:6px; cursor:pointer;">
                            <input type="radio" name="farePlan" value="${plan.name}" ${checked} onchange="selectedPlan='${plan.name}'">
                            <span class="plan-name">${plan.name}</span>
                        </label>
                        <span class="plan-tag">${plan.tag}</span>
                    </div>
                    <ul class="plan-detail">${detailHtml}</ul>
                </div>
            `;
        });
    }

    function confirmBooking() {
        const totalPax = paxCount.adult + paxCount.child + paxCount.infant;
        const destEl = document.getElementById('book-dest');
        const dest = destEl ? destEl.value : "";
        alert(`✈️ 預約成功！\n目的地：${dest}\n總乘客人數：${totalPax} 位 (成人 ${paxCount.adult} / 兒童 ${paxCount.child} / 嬰兒 ${paxCount.infant})\n選擇方案：${selectedPlan}\n\nFORMO AIR 丰慕航空期待為您服務！`);
    }

    function openAdmin() { document.getElementById('adminModal').style.display = 'flex'; }
    function closeAdmin() { document.getElementById('adminModal').style.display = 'none'; }
    function loginAdmin() {
        if(document.getElementById('adminPass').value === PASSWORD) {
            closeAdmin();
            document.getElementById('dashboardModal').style.display = 'flex';
        } else { alert('密碼錯誤！'); }
    }
    function closeDashboard() { document.getElementById('dashboardModal').style.display = 'none'; }

    // 初始化載入
    window.addEventListener('DOMContentLoaded', () => {
        updateDestinations();
